<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitTrack CUET - Login</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="login-container">
        <div class="login-left">
            <div class="branding">
                <i class="fas fa-dumbbell"></i>
                <h1>FitTrack CUET</h1>
                <p style="color: white;">Your Personal Fitness Companion</p>
            </div>
            <div class="features">
                <div class="feature-item">
                    <i class="fas fa-heartbeat"></i>
                    <span>Track Your Progress</span>
                </div>
                <div class="feature-item">
                    <i class="fas fa-robot"></i>
                    <span>AI-Powered Guidance</span>
                </div>
                <div class="feature-item">
                    <i class="fas fa-utensils"></i>
                    <span>Personalized Diet Plans</span>
                </div>
                <div class="feature-item">
                    <i class="fas fa-shield-alt"></i>
                    <span>Safety First Approach</span>
                </div>
            </div>
        </div>
        
        <div class="login-right">
            <div class="login-box">
                <h2>Welcome Back</h2>
                <p class="subtitle">Login to continue your fitness journey</p>
                
                <form id="loginForm" class="auth-form">
                    <div class="form-group">
                        <label for="studentId">Student ID</label>
                        <div class="input-group">
                            <i class="fas fa-id-card"></i>
                            <input type="text" id="studentId" name="studentId" placeholder="Enter your student ID" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="input-group">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="password" name="password" placeholder="Enter your password" required>
                            <i class="fas fa-eye toggle-password"></i>
                        </div>
                    </div>
                    
                    <div class="form-options">
                        <label class="remember-me">
                            <input type="checkbox" name="remember">
                            <span>Remember me</span>
                        </label>
                        <a href="#" class="forgot-password">Forgot Password?</a>
                    </div>
                    
                    <button type="submit" class="btn btn-primary">
                        <span>Login</span>
                        <i class="fas fa-arrow-right"></i>
                    </button>
                    
                    <div class="auth-footer">
                        <p>Don't have an account? <a href="register.html">Register here</a></p>
                        
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
